<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价格管理工具 - 贝壳李金松</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            color: white;
            box-shadow: 0 4px 15px rgba(235, 51, 73, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(235, 51, 73, 0.6);
        }

        .action-buttons {
            text-align: center;
            margin-top: 30px;
        }

        .action-buttons .btn {
            margin: 0 10px 10px 0;
        }

        .info-box {
            background: #e8f4fc;
            border-left: 4px solid #2e86c1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box h3 {
            color: #1a5276;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-box ul {
            margin-left: 20px;
        }

        .info-box li {
            margin-bottom: 5px;
            color: #333;
        }

        .status {
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 价格管理工具</h1>
            <p>快速更新楼盘价格信息 · 自动同步到GitHub</p>
        </div>

        <div class="info-box">
            <h3>📌 使用说明</h3>
            <ul>
                <li>选择要更新的区域和楼盘</li>
                <li>输入新的价格信息</li>
                <li>点击"更新价格"保存到本地</li>
                <li>点击"一键提交到GitHub"同步到网站</li>
            </ul>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📝 快速更新</h2>
                <div class="form-group">
                    <label>选择区域：</label>
                    <select id="regionSelect" onchange="loadProjects()">
                        <option value="">-- 请选择区域 --</option>
                        <option value="南山区">南山区</option>
                        <option value="福田区">福田区</option>
                        <option value="宝安区">宝安区</option>
                        <option value="龙华区">龙华区</option>
                        <option value="光明区">光明区</option>
                        <option value="沙井">沙井</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>选择楼盘：</label>
                    <select id="projectSelect">
                        <option value="">-- 请先选择区域 --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>价格信息（每行一个，格式：面积 价格）：</label>
                    <textarea id="priceInput" rows="8" placeholder="例如：
92㎡：883-982万
105㎡：1003-1144万
123㎡：1183-1346万"></textarea>
                </div>

                <div id="statusMessage"></div>

                <button class="btn btn-success" onclick="updatePrice()">更新价格</button>
            </div>

            <div class="card">
                <h2>⚙️ 批量操作</h2>
                <div class="form-group">
                    <label>批量导入（JSON格式）：</label>
                    <textarea id="batchInput" rows="8" placeholder='格式：
{
  "区域": "楼盘名": {
    "价格": ["92㎡：883-982万", "105㎡：1003-1144万"]
  }
}'></textarea>
                </div>

                <button class="btn btn-primary" onclick="batchUpdate()">批量更新</button>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-success" onclick="commitToGit()">🚀 一键提交到GitHub</button>
            <button class="btn btn-danger" onclick="openProjectFolder()">📂 打开项目文件夹</button>
        </div>
    </div>

    <script>
        // 楼盘数据映射
        const regionFiles = {
            "南山区": "data_core.js",
            "福田区": "data_futian.js",
            "宝安区": "data_baoshan.js",
            "龙华区": "data_longhua.js",
            "光明区": "data_guangming.js",
            "沙井": "data_shajing.js"
        };

        // 加载区域对应的楼盘
        function loadProjects() {
            const region = document.getElementById('regionSelect').value;
            const projectSelect = document.getElementById('projectSelect');

            if (!region) {
                projectSelect.innerHTML = '<option value="">-- 请先选择区域 --</option>';
                return;
            }

            // 这里应该从实际的JS文件中读取楼盘列表
            // 由于浏览器限制，这里先列出一些示例
            const projects = {
                "南山区": ["观山海", "绿景白石洲", "卓越缦悦", "湾启紫禁", "开云府"],
                "福田区": ["卓越缦悦", "金地环湾城", "新世界香蜜四季家园", "京基宸悦府"],
                "宝安区": ["中铁阅臻府", "保利瑧誉府", "云玺锦庭", "京地海樾府"],
                "龙华区": ["溪山禾玺御府", "塘城NEXT TOWN", "鸿荣源尚云"],
                "光明区": ["深物业御棠上府", "深业云筑", "松茂御城二期"],
                "沙井": ["珺悦名都", "玖玖颂阁"]
            };

            projectSelect.innerHTML = '<option value="">-- 请选择楼盘 --</option>';
            if (projects[region]) {
                projects[region].forEach(proj => {
                    projectSelect.innerHTML += `<option value="${proj}">${proj}</option>`;
                });
            }
        }

        // 更新价格
        function updatePrice() {
            const region = document.getElementById('regionSelect').value;
            const project = document.getElementById('projectSelect').value;
            const price = document.getElementById('priceInput').value.trim();
            const statusDiv = document.getElementById('statusMessage');

            if (!region || !project || !price) {
                showStatus('请填写完整信息', 'error');
                return;
            }

            // 保存到localStorage
            const updates = JSON.parse(localStorage.getItem('priceUpdates') || '{}');
            const key = `${region}|${project}`;
            updates[key] = {
                region: region,
                project: project,
                price: price,
                updateTime: new Date().toISOString()
            };
            localStorage.setItem('priceUpdates', JSON.stringify(updates));

            showStatus(`✓ 已保存：${region} - ${project}`, 'success');
        }

        // 批量更新
        function batchUpdate() {
            const input = document.getElementById('batchInput').value.trim();
            try {
                const data = JSON.parse(input);
                let count = 0;

                for (const region in data) {
                    for (const project in data[region]) {
                        const key = `${region}|${project}`;
                        const updates = JSON.parse(localStorage.getItem('priceUpdates') || '{}');

                        updates[key] = {
                            region: region,
                            project: project,
                            price: data[region][project].join('\n'),
                            updateTime: new Date().toISOString()
                        };

                        localStorage.setItem('priceUpdates', JSON.stringify(updates));
                        count++;
                    }
                }

                showStatus(`✓ 已批量保存 ${count} 个楼盘`, 'success');
            } catch (e) {
                showStatus('✗ JSON格式错误，请检查', 'error');
            }
        }

        // 提交到Git
        function commitToGit() {
            const updates = JSON.parse(localStorage.getItem('priceUpdates') || '{}');
            const entries = Object.entries(updates);

            if (entries.length === 0) {
                alert('没有待提交的价格更新！');
                return;
            }

            let message = '更新价格信息：\n\n';
            entries.forEach(([key, data]) => {
                message += `- ${data.region} - ${data.project}\n`;
            });

            // 创建更新说明文件
            const updateInfo = {
                updateTime: new Date().toISOString(),
                updates: entries.map(([key, data]) => ({
                    region: data.region,
                    project: data.project,
                    price: data.price
                }))
            };

            // 下载更新说明文件
            const blob = new Blob([JSON.stringify(updateInfo, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `价格更新_${new Date().toISOString().split('T')[0]}.json`;
            a.click();

            showStatus('✓ 已生成更新文件！请使用"一键提交并推送.bat"提交到GitHub', 'success');
        }

        // 打开项目文件夹
        function openProjectFolder() {
            alert('请手动打开文件夹：C:\\Users\\11465\\Desktop\\sz-realestate');
        }

        // 显示状态
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
            statusDiv.style.display = 'block';

            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }

        // 页面加载时恢复数据
        window.onload = function() {
            const updates = JSON.parse(localStorage.getItem('priceUpdates') || '{}');
            const entries = Object.entries(updates);

            if (entries.length > 0) {
                showStatus(`有 ${entries.length} 个楼盘待提交`, 'success');
            }
        };
    </script>
</body>
</html>
