<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深圳楼盘全集 (贝壳李金松专属版)</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2e86c1">
    
    <style>
        /* === 基础样式 === */
        :root { --primary-color: #2e86c1; --sidebar-bg: #f8f9fa; --border-color: #e0e0e0; --hover-bg: #e9ecef; --active-bg: #e8f4fc; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: "Microsoft YaHei", -apple-system, sans-serif; height: 100vh; display: flex; overflow: hidden; color: #333; background: #fff; }
        
        /* === 水印样式修正版 (支持换行) === */
        .watermark-container {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999;
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            overflow: hidden; opacity: 0.1; /* 透明度 */
        }
        .watermark-text {
            transform: rotate(-25deg); 
            font-size: 15px; 
            color: #000; 
            font-weight: 800;
            margin: 60px 40px; 
            width: 320px; /* 宽度给够，防止截断 */
            text-align: center;
            line-height: 1.5;
            white-space: pre-wrap; /* 关键：允许\n换行 */
        }

        /* 侧边栏 & 搜索 */
        .sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; user-select: none; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border-color); background: #fff; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-header h2 { font-size: 18px; color: var(--primary-color); font-weight: bold; }
        
        /* 语言选择器 */
        .language-selector {
            display: flex; gap: 5px; align-items: center; margin-top: 5px;
        }
        .lang-btn {
            padding: 4px 10px; border: 1px solid #ddd; background: #fff;
            border-radius: 4px; cursor: pointer; font-size: 12px;
            transition: all 0.2s;
        }
        .lang-btn:hover { background: #f0f0f0; }
        .lang-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        
        /* 搜索框样式 */
        .search-box {
            width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px;
            font-size: 14px; outline: none; transition: border 0.3s;
        }
        .search-box:focus { border-color: var(--primary-color); box-shadow: 0 0 3px rgba(46,134,193,0.3); }

        .nav-tree { flex: 1; overflow-y: auto; padding-bottom: 50px; }
        
        /* 导航节点 */
        .nav-group { display: none; }
        .nav-group.show { display: block; }
        .has-arrow::after { content: '▸'; float: right; color: #999; transform: rotate(0); transition: transform 0.2s; }
        .has-arrow.open::after { transform: rotate(90deg); }
        .level-1 { padding: 15px 20px; font-size: 16px; font-weight: 800; cursor: pointer; border-bottom: 1px solid #eee; background: #fff; color: #2c3e50; }
        .level-2 { padding: 12px 20px 12px 35px; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 1px solid #f1f1f1; background: #f8f9fa; color: #555; }
        .level-3 { padding: 10px 20px 10px 50px; font-size: 14px; font-weight: normal; cursor: pointer; background: #fff; color: #333; border-left: 4px solid transparent; border-bottom: 1px solid #fafafa; }
        .level-3.open { font-weight: bold; color: var(--primary-color); }
        .level-4 { padding: 8px 20px 8px 70px; font-size: 13px; cursor: pointer; color: #666; transition: all 0.2s; display: flex; align-items: center; }
        .level-4.active { background: var(--active-bg); color: var(--primary-color); font-weight: bold; }
        
        /* 主内容区 */
        .main-content { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        .content-wrapper { max-width: 960px; margin: 0 auto; padding: 40px; }
        
        /* 内容样式 */
        .content-body p { line-height: 1.8; margin-bottom: 15px; text-align: justify; color: #333; }
        .content-body h2 { color: #1a5276; border-left: 4px solid #2e86c1; padding-left: 10px; margin: 30px 0 15px; font-size: 22px; font-weight: bold; }
        .content-body h3 { color: #2e86c1; margin: 20px 0 10px; font-size: 18px; font-weight: bold; }
        .content-body ul { padding-left: 20px; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px 15px; text-align: left; }
        th { background-color: #f2f2f2; font-weight: bold; width: 25%; }
        .highlight { background-color: #e8f4fc; padding: 20px; border-radius: 5px; margin: 20px 0; border-left: 4px solid #2e86c1; }
        .price-comparison, .special-offer { background-color: #e8f6f3; padding: 20px; border-radius: 5px; margin: 20px 0; border-left: 4px solid #28b463; }
        .disadvantages { background-color: #fdedec; padding: 20px; border-radius: 5px; margin: 20px 0; border-left: 4px solid #e74c3c; }
        .summary { background-color: #fef9e7; padding: 20px; border-radius: 5px; margin-top: 20px; border-left: 4px solid #f39c12; }
        .placeholder { padding: 50px; text-align: center; color: #ccc; border: 2px dashed #eee; border-radius: 8px; background: #fafafa; }

        /* 搜索结果样式 */
        .search-result-item { padding: 12px 20px; border-bottom: 1px solid #eee; cursor: pointer; }
        .search-result-item:hover { background: #f0f0f0; }
        .search-path { font-size: 12px; color: #999; margin-bottom: 4px; }
        .search-name { font-weight: bold; color: var(--primary-color); }
        .search-match { font-size: 12px; color: #666; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* === 悬浮球 & 购物车功能 === */
        .floating-ball {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: linear-gradient(135deg, #2e86c1, #1a5276); color: white;
            border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000; transition: transform 0.2s;
        }
        .floating-ball:active { transform: scale(0.95); }
        .ball-count { font-size: 18px; font-weight: bold; }
        .ball-label { font-size: 10px; }
        
        /* 购物车弹窗 */
        .cart-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000;
            align-items: center; justify-content: center;
        }
        .cart-modal.active { display: flex; }
        .cart-content {
            background: #fff; width: 90%; max-width: 500px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; max-height: 80vh; display: flex; flex-direction: column;
        }
        .cart-header { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .cart-body { padding: 20px; overflow-y: auto; flex: 1; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; align-items: center; }
        .cart-footer { padding: 20px; border-top: 1px solid #eee; text-align: center; }
        .btn-primary { background: #2e86c1; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-delete { color: #e74c3c; cursor: pointer; padding: 5px; }

        /* 详情页加入按钮 */
        .add-to-cart-btn {
            display: inline-block; background: #28b463; color: white; padding: 5px 12px;
            border-radius: 4px; font-size: 12px; margin-left: 10px; cursor: pointer; vertical-align: middle;
        }
        .add-to-cart-btn.added { background: #ccc; cursor: default; }

        /* 手机适配 */
        .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 200; background: #fff; padding: 8px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 85%; transform: translateX(-100%); transition: transform 0.3s; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .overlay.active { display: block; }
            .content-wrapper { padding: 70px 20px 20px; }
            .watermark-text { font-size: 13px; margin: 40px 10px; width: 280px; }
        }
    </style>
</head>
<body>
    <div class="watermark-container" id="watermark"></div>

    <div class="floating-ball" onclick="openCart()">
        <span class="ball-count" id="cartCount">0</span>
        <span class="ball-label">生成报告</span>
    </div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h3>📦 专属置业报告清单</h3>
                <span style="cursor:pointer; font-size:20px;" onclick="closeCart()">×</span>
            </div>
            <div class="cart-body" id="cartList">
                <p style="text-align:center; color:#999;">${t('cartEmptyShort')}</p>
            </div>
            <div class="cart-footer">
                <button class="btn-primary" onclick="generateShareLink()">🔗 复制���接分享给客户</button>
                <button class="btn-primary" onclick="generateReport()" style="margin-top:10px;">⬇️ 下载HTML文件</button>
            </div>
        </div>
    </div>

    <div class="menu-toggle" onclick="toggleMobileMenu()">☰ 目录</div>
    <div class="overlay" onclick="toggleMobileMenu()"></div>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 id="appTitle">🏢 深圳楼盘全集</h2>
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 搜楼盘 / 区域 / 300万..." oninput="handleSearch(this.value)">
            <div class="language-selector">
                <span style="font-size:12px; color:#666; margin-right:5px;">🌐</span>
                <button class="lang-btn active" data-lang="zh-CN" onclick="setLanguage('zh-CN')">中文</button>
                <button class="lang-btn" data-lang="en-US" onclick="setLanguage('en-US')">English</button>
            </div>
            <div style="font-size:12px; color:#666;" id="vipLabel">贝壳李金松 VIP专属方案</div>
        </div>
        <div class="nav-tree" id="navTree"></div>
    </aside>
    
    <main class="main-content">
        <div class="content-wrapper" id="contentArea">
            <div style="text-align:center; margin-top:100px; color:#999;">请选择左侧楼盘查看详情<br><br>数据加载自 data.js</div>
        </div>
    </main>

<script src="js/data_core.js"></script>
<script src="js/data_baoshan.js"></script>    <script src="js/data_shajing.js"></script>    <script src="js/data_futian.js"></script>     <script src="js/data_longhua.js"></script>    <script src="js/data_guangming.js"></script>  
<script>
    // --- 语言配置系统 ---
    const translations = {
        'zh-CN': {
            appTitle: '🏢 深圳楼盘全集',
            searchPlaceholder: '🔍 搜楼盘 / 区域 / 300万...',
            vipLabel: '贝壳李金松 VIP专属方案',
            menuToggle: '☰ 目录',
            cartLabel: '生成报告',
            cartTitle: '📦 专属置业报告清单',
            cartEmpty: '还没有添加楼盘。<br>请在楼盘详情页点击"+ 加入报告"',
            cartEmptyShort: '暂无选择的楼盘，请去详情页添加',
            downloadReport: '⬇️ 下载专属页面 (HTML)',
            delete: '删除',
            addToReport: '➕ 加入报告',
            added: '已加入',
            priceRange: '【💰 价格区间】',
            projectFacilities: '项目配套',
            unitIntroduction: '户型介绍',
            priceMap: '价格地图',
            priceOverview: '价格总览',
            noData: '暂无数据',
            waitingInput: '等待录入...',
            noResults: '无匹配结果',
            foundResults: '找到 {count} 个结果',
            containsKeyword: '包含搜索关键词',
            matchedInFacilities: '在配套信息中匹配',
            matchedInUnits: '在户型介绍中匹配',
            matchedInName: '项目名称匹配',
            selectProject: '请选择左侧楼盘查看详情<br><br>数据加载自 data.js',
            needDataFile: '需加载数据文件 data_core.js',
            addProjectsFirst: '请先添加楼盘！',
            reportTitle: 'VIP 专属置业报告',
            exclusiveAdvisor: '专属顾问：贝壳李金松',
            phoneWechat: '电话/微信：17277898972',
            discountNote: '预约看房领专属折扣（总价的一个点起）',
            generatedDate: '生成日期：',
            noFacilitiesInfo: '暂无配套信息',
            noUnitInfo: '暂无户型信息'
        },
        'en-US': {
            appTitle: '🏢 Shenzhen Property Collection',
            searchPlaceholder: '🔍 Search properties / areas / 3M...',
            vipLabel: 'Beike Li Jinsong VIP Exclusive Plan',
            menuToggle: '☰ Menu',
            cartLabel: 'Generate Report',
            cartTitle: '📦 Exclusive Property Report List',
            cartEmpty: 'No properties added yet.<br>Please click "+ Add to Report" on property detail page',
            cartEmptyShort: 'No properties selected, please add from detail page',
            downloadReport: '⬇️ Download Exclusive Page (HTML)',
            delete: 'Delete',
            addToReport: '➕ Add to Report',
            added: 'Added',
            priceRange: '【💰 Price Range】',
            projectFacilities: 'Project Facilities',
            unitIntroduction: 'Unit Introduction',
            priceMap: 'Price Map',
            priceOverview: 'Price Overview',
            noData: 'No data available',
            waitingInput: 'Waiting for input...',
            noResults: 'No matching results',
            foundResults: 'Found {count} results',
            containsKeyword: 'Contains search keyword',
            matchedInFacilities: 'Matched in facilities info',
            matchedInUnits: 'Matched in unit info',
            matchedInName: 'Matched in project name',
            selectProject: 'Please select a property from the left to view details<br><br>Data loaded from data.js',
            needDataFile: 'Need to load data file data_core.js',
            addProjectsFirst: 'Please add properties first!',
            reportTitle: 'VIP Exclusive Property Report',
            exclusiveAdvisor: 'Exclusive Advisor: Beike Li Jinsong',
            phoneWechat: 'Phone/WeChat: 17277898972',
            discountNote: 'Book viewing to get exclusive discount (1% of total price)',
            generatedDate: 'Generated Date: ',
            noFacilitiesInfo: 'No facilities information available',
            noUnitInfo: 'No unit information available'
        }
    };

    let currentLanguage = localStorage.getItem('appLanguage') || 'zh-CN';

    function t(key, params = {}) {
        let text = translations[currentLanguage][key] || translations['zh-CN'][key] || key;
        if (params.count !== undefined) {
            text = text.replace('{count}', params.count);
        }
        return text;
    }

    function setLanguage(lang) {
        currentLanguage = lang;
        localStorage.setItem('appLanguage', lang);
        document.documentElement.lang = lang;
        
        // Update language buttons
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });
        
        // Update all UI text
        updateUIText();
        
        // Reinitialize menu to update labels
        initMenu();
    }

    function updateUIText() {
        // Update sidebar header
        document.getElementById('appTitle').textContent = t('appTitle');
        document.getElementById('searchInput').placeholder = t('searchPlaceholder');
        document.getElementById('vipLabel').textContent = t('vipLabel');
        
        // Update floating ball
        document.querySelector('.ball-label').textContent = t('cartLabel');
        
        // Update cart modal
        const cartTitle = document.querySelector('.cart-header h3');
        if (cartTitle) cartTitle.textContent = t('cartTitle');
        
        const downloadBtn = document.querySelector('.btn-primary');
        if (downloadBtn) downloadBtn.textContent = t('downloadReport');
        
        // Update menu toggle
        const menuToggle = document.querySelector('.menu-toggle');
        if (menuToggle) menuToggle.textContent = t('menuToggle');
        
        // Update placeholder content
        const contentArea = document.getElementById('contentArea');
        if (contentArea && contentArea.innerHTML.includes('请选择左侧楼盘')) {
            contentArea.innerHTML = `<div style="text-align:center; margin-top:100px; color:#999;">${t('selectProject')}</div>`;
        }
    }

    // Initialize language on page load
    document.documentElement.lang = currentLanguage;
    // Set active language button
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLanguage);
    });
    updateUIText();

    // --- 水印生成（已更新文字） ---
    function initWatermark() {
        const container = document.getElementById('watermark');
        // 使用 \n 换行，样式中 white-space: pre-wrap 保证换行生效
        const text = "贝壳李金松17277898972\n预约看房领专属折扣（总价的一个点起）";
        
        // 生成足够多的水印铺满屏幕
        for(let i=0; i<15; i++) {
            const div = document.createElement('div');
            div.className = 'watermark-text';
            div.innerText = text;
            container.appendChild(div);
        }
    }
    initWatermark();

    // --- 数据合并逻辑 ---
    if (typeof db_baoshan !== 'undefined') Object.assign(db, db_baoshan);
    if (typeof db_shajing !== 'undefined') Object.assign(db, db_shajing);
    if (typeof db_futian !== 'undefined') Object.assign(db, db_futian);
    if (typeof db_longhua !== 'undefined') Object.assign(db, db_longhua);
    if (typeof db_guangming !== 'undefined') Object.assign(db, db_guangming);

    // --- 购物车/报告系统 ---
    let reportCart = new Set(); // 存储格式: "Region|Sub|Project"

    function updateCartCount() {
        document.getElementById('cartCount').innerText = reportCart.size;
    }

    function addToCart(region, sub, proj) {
        const key = `${region}|${sub}|${proj}`;
        if(reportCart.has(key)) return;
        reportCart.add(key);
        updateCartCount();
        
        // 更新按钮状态
        const btn = document.getElementById(`btn-${proj}`);
        if(btn) {
            btn.innerText = t('added');
            btn.classList.add('added');
        }
    }

    function removeFromCart(key) {
        reportCart.delete(key);
        updateCartCount();
        openCart(); // 刷新列表
    }

    function openCart() {
        const modal = document.getElementById('cartModal');
        const list = document.getElementById('cartList');
        modal.classList.add('active');
        list.innerHTML = '';

        if(reportCart.size === 0) {
            list.innerHTML = `<p style="text-align:center; color:#999; margin-top:20px;">${t('cartEmpty')}</p>`;
            return;
        }

        reportCart.forEach(key => {
            const [r, s, p] = key.split('|');
            const item = document.createElement('div');
            item.className = 'cart-item';
            item.innerHTML = `
                <div><strong>${p}</strong> <span style="font-size:12px; color:#666;">(${r}-${s})</span></div>
                <div class="btn-delete" onclick="removeFromCart('${key}')">${t('delete')}</div>
            `;
            list.appendChild(item);
        });
    }

    function closeCart() {
        document.getElementById('cartModal').classList.remove('active');
    }

   // --- 核心优化：带水印、宽绰排版、三层折叠报告生成器 ---
function generateReport() {
    if(reportCart.size === 0) return alert(t('addProjectsFirst'));

    let reportContent = '';
    const today = new Date().toLocaleDateString();

    // 1. 循环构建楼盘内容 (三层结构)
    reportCart.forEach(key => {
        const [region, sub, proj] = key.split('|');
        const projData = db[region][sub][proj] || {};
        
        const peitao = projData.peitao && projData.peitao.trim() !== '' ? projData.peitao : `<p style="color:#999;">${t('noFacilitiesInfo')}</p>`;
        const huxing = projData.huxing && projData.huxing.trim() !== '' ? projData.huxing : `<p style="color:#999;">${t('noUnitInfo')}</p>`;

        reportContent += `
        <div class="proj-group">
            <div class="btn-l1" onclick="toggleBox(this)">
                <span class="title">🏢 ${proj}</span>
                <span class="icon">＋</span>
            </div>
            <div class="content-l1" style="display:none;">
                
                <div class="category-box">
                    <div class="btn-l2" onclick="toggleBox(this)">
                        <span>📍 ${t('projectFacilities')}</span>
                        <span class="icon">＋</span>
                    </div>
                    <div class="content-l2" style="display:none;">
                        <div class="article-body">${peitao}</div>
                    </div>
                </div>

                <div class="category-box">
                    <div class="btn-l2" onclick="toggleBox(this)">
                        <span>🏠 ${t('unitIntroduction')}</span>
                        <span class="icon">＋</span>
                    </div>
                    <div class="content-l2" style="display:none;">
                        <div class="article-body">${huxing}</div>
                    </div>
                </div>

            </div>
        </div>`;
    });

    const rTitle = t('reportTitle');
    const rAdvisor = t('exclusiveAdvisor');
    const rPhone = t('phoneWechat');
    const rDiscount = t('discountNote');
    const rDate = t('generatedDate');

    // 2. 生成完整的 HTML (包含针对移动端优化的 CSS 和水印脚本)
    const htmlTemplate = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>${rTitle}</title>
    <style>
        /* === 消除排版局促感：全局样式 === */
        body { font-family: "Microsoft YaHei", -apple-system, sans-serif; background: #f4f6f9; margin: 0; padding: 25px 15px; color: #333; line-height: 1.8; }
        .report-wrapper { max-width: 700px; margin: 0 auto; position: relative; z-index: 10; }
        
        /* === 头部：加深视觉深度 === */
        .report-header { background: #fff; padding: 40px 20px; border-radius: 20px; text-align: center; box-shadow: 0 12px 30px rgba(0,0,0,0.06); margin-bottom: 30px; border-top: 8px solid #2e86c1; }

        .info-pill { background: #f0f7fd; padding: 18px 25px; border-radius: 60px; display: inline-block; border: 1px solid #d0e8f9; }
        .discount-highlight { color: #e74c3c; font-weight: bold; font-size: 14px; display: block; margin-top: 8px; }

        /* === 第一层：项目卡片 (增加间距) === */
        .proj-group { background: #fff; border-radius: 18px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.04); }
        .btn-l1 { padding: 24px 20px; background: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f2f2f2; }
        .btn-l1 .title { font-size: 20px; font-weight: bold; color: #2c3e50; }

        /* === 第二层：分类块 (增加呼吸感) === */
        .category-box { margin-bottom: 15px; border-radius: 14px; overflow: hidden; border: 1px solid #eee; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .btn-l2 { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 600; color: #555; }
        .content-l2 { border-top: 1px dashed #f0f0f0; }

        /* === 第三层：内容正文 (优化排版) === */
        .article-body { padding: 25px 20px; font-size: 15px; color: #444; word-wrap: break-word; }
        .article-body p { margin-bottom: 18px; text-align: justify; }
        .article-body table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; background: #fff; }
        .article-body th, .article-body td { border: 1px solid #eee; padding: 14px 10px; text-align: left; }
        .article-body th { background: #f9f9f9; color: #666; width: 32%; }
        
        /* 富文本修饰块 */
        .highlight, .price-comparison, .special-offer, .disadvantages { padding: 20px; border-radius: 10px; margin: 25px 0; border-left: 6px solid #ccc; font-size: 14px; }

        .special-offer { border-color: #27ae60; background: #f2fff6; }
        .disadvantages { border-color: #e74c3c; background: #fff7f7; }

        /* 交互小标 */
        .icon { color: #ccc; font-size: 20px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .active .icon { transform: rotate(45deg); color: #2e86c1; }

        /* === 水印样式 === */
        .wm-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; overflow: hidden; opacity: 0.07; }
        .wm-item { transform: rotate(-25deg); font-size: 14px; color: #000; font-weight: bold; margin: 60px 40px; width: 300px; text-align: center; white-space: pre-wrap; line-height: 1.5; }

        /* 手机超小屏适配 */
        @media (max-width: 400px) {
            body { padding: 15px 10px; }
            .report-header { padding: 30px 15px; }
            .btn-l1 .title { font-size: 18px; }
        }
    </style>
</head>

    <script>

</html>`;

    // 3. 执行下载流程
    const blob = new Blob([htmlTemplate], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const reportName = currentLanguage === 'zh-CN' ? '专属置业报告' : 'Property_Report';
    a.download = reportName + "_" + new Date().getTime() + ".html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

// 生成客户专用分享链接
function generateShareLink() {
    if(reportCart.size === 0) {
        alert('请先添加楼盘到报告清单！');
        return;
    }

    // 获取选中的项目列表
    const projects = Array.from(reportCart);
    // 使用简单的分隔符：区域|子区域|项目名，用逗号分隔多个项目
    const projectsParam = projects.join(',');

    // 生成带参数的链接
    const baseUrl = window.location.origin + window.location.pathname;
    const shareUrl = baseUrl + '?projects=' + encodeURIComponent(projectsParam);

    // 复制到剪贴板
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(shareUrl).then(() => {
            alert('✅ 客户专用链接已复制！\n\n发送给客户后，他们只能看到你选中的 ' + projects.length + ' 个楼盘');
            closeCart();
        }).catch(err => {
            console.error('复制失败:', err);
            fallbackCopy(shareUrl);
        });
    } else {
        fallbackCopy(shareUrl);
    }
}

// 检查URL参数并加载特定项目
function checkSharedProjects() {
    const params = new URLSearchParams(window.location.search);
    const projectsParam = params.get('projects');

    if(projectsParam) {
        try {
            // 解码项目列表
            const projects = decodeURIComponent(projectsParam).split(',');

            if(projects.length > 0) {
                // 启用筛选模式
                enableFilteredMode(projects);
            }
        } catch(e) {
            console.error('解析项目参数失败:', e);
        }
    }
}

// 启用筛选模式 - 只显示选中的项目
function enableFilteredMode(projects) {
    // 隐藏侧边栏和菜单
    document.getElementById('sidebar').style.display = 'none';
    document.querySelector('.menu-toggle').style.display = 'none';
    document.querySelector('.floating-ball').style.display = 'none';

    // 调整内容区域宽度
    const contentWrapper = document.querySelector('.content-wrapper');
    if(contentWrapper) {
        contentWrapper.style.maxWidth = '100%';
        contentWrapper.style.margin = '0 auto';
    }

    // 添加顶部提示
    const notice = document.createElement('div');
    notice.id = 'shareNotice';
    notice.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#2e86c1;color:white;padding:12px;text-align:center;z-index:10000;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.1);';
    notice.innerHTML = '📢 贝壳李金松为您精选推荐 ' + projects.length + ' 个楼盘 <span style="float:right;cursor:pointer;font-size:20px;margin-right:10px;" onclick="document.getElementById(\'shareNotice\').remove()">&times;</span>';
    document.body.appendChild(notice);

    // 显示所有选中的项目
    const contentArea = document.getElementById('contentArea');
    contentArea.innerHTML = '<h2 style="color:#2e86c1;margin-bottom:20px;">📋 为您精选的楼盘推荐</h2>';

    projects.forEach((projectKey, index) => {
        const [region, sub, proj] = projectKey.split('|');
        if(db[region] && db[region][sub] && db[region][sub][proj]) {
            const projData = db[region][sub][proj];

            // 创建项目卡片
            const card = document.createElement('div');
            card.style.cssText = 'background:white;border-radius:12px;padding:25px;margin-bottom:25px;box-shadow:0 2px 12px rgba(0,0,0,0.08);';

            card.innerHTML = `
                <div style="border-bottom:2px solid #2e86c1;padding-bottom:15px;margin-bottom:20px;">
                    <h3 style="color:#2e86c1;font-size:22px;margin:0;">🏢 ${proj}</h3>
                    <p style="color:#666;margin:8px 0 0;font-size:14px;">📍 ${region} - ${sub}</p>
                </div>
                <div style="margin-bottom:20px;">
                    <h4 style="color:#2e86c1;font-size:16px;margin:0 0 12px;">📍 项目配套</h4>
                    <div style="line-height:1.8;color:#333;">${projData.peitao || '<p style="color:#999;">暂无信息</p>'}</div>
                </div>
                <div>
                    <h4 style="color:#2e86c1;font-size:16px;margin:0 0 12px;">🏠 户型介绍</h4>
                    <div style="line-height:1.8;color:#333;">${projData.huxing || '<p style="color:#999;">暂无信息</p>'}</div>
                </div>
            `;

            contentArea.appendChild(card);
        }
    });

    // 添加底部联系信息
    const footer = document.createElement('div');
    footer.style.cssText = 'text-align:center;padding:40px 20px;background:#f8f9fa;border-radius:12px;margin-top:30px;';
    footer.innerHTML = `
        <p style="color:#2e86c1;font-size:18px;font-weight:bold;margin:0 0 10px;">👤 贝壳李金松</p>
        <p style="color:#333;font-size:16px;margin:0 0 8px;">📞 电话/微信：17277898972</p>
        <p style="color:#e74c3c;font-size:14px;margin:0;">💡 预约看房领专属折扣（总价的一个点起）</p>
    `;
    contentArea.appendChild(footer);
}

// 复制页面链接（保留原功能）
function copyPageLink() {
    const pageUrl = window.location.href;

    // 使用现代的Clipboard API
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(pageUrl).then(() => {
            alert('✅ 链接已复制！\n\n现在可以直接发送给客户了\n\n提示：客户打开后会看到完整页面，建议他们点击楼盘查看详情');
        }).catch(err => {
            console.error('复制失败:', err);
            fallbackCopy(pageUrl);
        });
    } else {
        fallbackCopy(pageUrl);
    }
}

// 备用复制方法（兼容旧浏览器）
function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();

    try {
        document.execCommand('copy');
        alert('✅ 链接已复制！\n\n现在可以直接发送给客户了\n\n提示：客户打开后会看到完整页面，建议他们点击楼盘查看详情');
    } catch (err) {
        console.error('复制失败:', err);
        alert('❌ 复制失败，请手动复制地址栏链接');
    }

    document.body.removeChild(textarea);
}

    // --- 菜单与内容逻辑 ---
    
    function createNode(text, className, parent) {
        const div = document.createElement('div');
        div.className = className;
        div.innerHTML = text;
        parent.appendChild(div);
        return div;
    }

    function createContainer(parent) {
        const div = document.createElement('div');
        div.className = 'nav-group';
        parent.appendChild(div);
        return div;
    }

    function toggleNode(node, container) {
        node.classList.toggle('open');
        container.classList.toggle('show');
    }

    function loadContent(region, sub, proj, typeLabel, htmlContent) {
        const area = document.getElementById('contentArea');
        let content;
        
        // Check if it's price map (handle both Chinese and English)
        if (proj === t('priceMap') || proj === "价格地图" || proj === "价格总览") {
            const priceMapContent = db[region]['_PRICE_MAP'] || `<div class="placeholder">${t('noData')}</div>`;
            area.innerHTML = `
                <div class="breadcrumb">${region} / ${sub} / ${t('priceMap')}</div>
                <h1 class="page-header">${region} - ${sub}</h1>
                <div class="content-body">${priceMapContent}</div>`;
        } else {
            const data = db[region] && db[region][sub] && db[region][sub][proj] ? db[region][sub][proj] : {};
            // Check if it's facilities (handle both Chinese and English labels)
            const isFacilities = typeLabel === t('projectFacilities') || typeLabel === '项目配套' || typeLabel === 'Project Facilities';
            htmlContent = data[isFacilities ? 'peitao' : 'huxing'];
            
            content = htmlContent && htmlContent.trim() !== '' ? htmlContent : `<div class="placeholder">${t('waitingInput')}</div>`;
            
            // 检查是否已在购物车
            const key = `${region}|${sub}|${proj}`;
            const isAdded = reportCart.has(key);
            const btnText = isAdded ? t('added') : t('addToReport');
            const btnClass = isAdded ? "add-to-cart-btn added" : "add-to-cart-btn";
            
            // Get translated type label
            const translatedTypeLabel = isFacilities ? t('projectFacilities') : t('unitIntroduction');

            area.innerHTML = `
                <div class="breadcrumb">${region} / ${sub} / ${proj}</div>
                <div style="display:flex; align-items:center; margin-bottom:20px;">
                    <h1 class="page-header" style="margin:0;">${proj} - ${translatedTypeLabel}</h1>
                    <div id="btn-${proj}" class="${btnClass}" onclick="addToCart('${region}', '${sub}', '${proj}')">${btnText}</div>
                </div>
                <div class="content-body">${content}</div>`;
        }
        document.querySelector('.main-content').scrollTop = 0;
    }

    // --- 搜索逻辑 ---
    function handleSearch(keyword) {
        const navTree = document.getElementById('navTree');
        keyword = keyword.trim().toLowerCase();

        if (!keyword) {
            initMenu();
            return;
        }

        let results = [];
        const regionOrder = ["南山区", "福田区", "宝安区", "龙华区", "沙井", "光明区"];

        regionOrder.forEach(region => {
            if(!db[region]) return;
            const subRegions = db[region];
            
            if (subRegions._PRICE_MAP && subRegions._PRICE_MAP.toLowerCase().includes(keyword)) {
                 results.push({
                     name: `${region} - ${t('priceOverview')}`,
                     path: `${region}`,
                     match: t('containsKeyword'),
                     action: () => loadContent(region, t('priceRange').replace('【💰 ', '').replace('】', ''), t('priceMap'), t('priceOverview'), null)
                 });
            }

            Object.keys(subRegions).forEach(sub => {
                if (sub === '_PRICE_MAP') return;
                const projects = subRegions[sub];

                Object.keys(projects).forEach(proj => {
                    const data = projects[proj];
                    const peitao = (data.peitao || "").toLowerCase();
                    const huxing = (data.huxing || "").toLowerCase();
                    const projName = proj.toLowerCase();
                    const subName = sub.toLowerCase();

                    if (projName.includes(keyword) || subName.includes(keyword) || peitao.includes(keyword) || huxing.includes(keyword)) {
                        let matchText = "";
                        if(peitao.includes(keyword)) matchText = t('matchedInFacilities');
                        else if(huxing.includes(keyword)) matchText = t('matchedInUnits');
                        else matchText = t('matchedInName');

                        results.push({
                            name: proj,
                            path: `${region} / ${sub}`,
                            match: matchText,
                            action: () => loadContent(region, sub, proj, t('projectFacilities'), data.peitao)
                        });
                    }
                });
            });
        });

        navTree.innerHTML = '';
        if(results.length === 0) {
            navTree.innerHTML = `<div style="padding:20px; color:#999; text-align:center;">${t('noResults')}</div>`;
        } else {
            const header = document.createElement('div');
            header.style.padding = "10px 20px";
            header.style.fontSize = "12px";
            header.style.color = "#999";
            header.innerText = t('foundResults', { count: results.length });
            navTree.appendChild(header);

            results.forEach(item => {
                const el = document.createElement('div');
                el.className = 'search-result-item';
                el.innerHTML = `
                    <div class="search-path">${item.path}</div>
                    <div class="search-name">${item.name}</div>
                    <div class="search-match">${item.match}</div>
                `;
                el.onclick = () => {
                    item.action();
                    if(window.innerWidth <= 768) toggleMobileMenu();
                    document.querySelectorAll('.search-result-item').forEach(i=>i.style.background='');
                    el.style.background = '#e8f4fc';
                };
                navTree.appendChild(el);
            });
        }
    }

    function toggleMobileMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    }

    function initMenu() {
        if (typeof db === 'undefined' || Object.keys(db).length === 0) {
            document.getElementById('contentArea').innerHTML = `<div style="color:red; text-align:center; margin-top:50px;">${t('needDataFile')}</div>`;
            return;
        }

        const navTree = document.getElementById('navTree');
        const regionOrder = ["南山区", "福田区", "宝安区", "龙华区", "沙井", "光明区"];
        
        navTree.innerHTML = ''; 

        regionOrder.forEach(region => {
            const subRegions = db[region] || {};
            if (Object.keys(subRegions).length === 0 && !subRegions._PRICE_MAP) return;

            const l1 = createNode(region, 'level-1 has-arrow', navTree);
            const l1Container = createContainer(navTree);
            l1.onclick = () => toggleNode(l1, l1Container);

            if (subRegions._PRICE_MAP) {
                const priceNode = createNode(t('priceRange'), 'level-2 summary-entry', l1Container);
                priceNode.onclick = function() {
                    document.querySelectorAll('.level-4, .summary-entry').forEach(el => el.classList.remove('active'));
                    this.classList.add('active');
                    loadContent(region, t('priceRange').replace('【💰 ', '').replace('】', ''), t('priceMap'), t('priceOverview'), null); 
                    if(window.innerWidth <= 768) toggleMobileMenu();
                };
            }

            let subKeys = Object.keys(subRegions).filter(key => key !== '_PRICE_MAP'); 
            if(region === "南山区") {
                const order = ['前海', '粤海街道', '华侨城', '南头', '赤湾', '西丽'];
                subKeys.sort((a,b) => order.indexOf(a) - order.indexOf(b));
            }
            
            subKeys.forEach(sub => {
                const projects = subRegions[sub];
                if (Object.keys(projects).length === 0) return;

                const l2 = createNode(sub, 'level-2 has-arrow', l1Container);
                const l2Container = createContainer(l1Container);
                l2.onclick = () => toggleNode(l2, l2Container);

                Object.keys(projects).forEach(proj => {
                    const l3 = createNode(proj, 'level-3 has-arrow', l2Container);
                    const l3Container = createContainer(l2Container);
                    l3.onclick = () => toggleNode(l3, l3Container);

                    const types = [
                        { key: 'peitao', label: t('projectFacilities') }, 
                        { key: 'huxing', label: t('unitIntroduction') }
                    ];
                    types.forEach(type => {
                        const l4 = document.createElement('div');
                        l4.className = 'level-4';
                        l4.innerText = type.label;
                        l4.onclick = function() {
                            document.querySelectorAll('.level-4, .summary-entry').forEach(el => el.classList.remove('active'));
                            this.classList.add('active');
                            const data = projects[proj] || {};
                            loadContent(region, sub, proj, type.label, data[type.key]);
                            if(window.innerWidth <= 768) toggleMobileMenu();
                        };
                        l3Container.appendChild(l4);
                    });
                });
            });
        });
    }

    initMenu();
    checkSharedProjects(); // 检查是否有分享链接参数
</script>
</body>
